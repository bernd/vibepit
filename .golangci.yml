# See: https://golangci-lint.run/docs/configuration/file/
version: "2"

issues:
  exclude: []

linters:
  # We enable all linters and disable the ones we don't want. That way we
  # can discover new interesting linters when they get added to golangci-lint.
  default: "all"

  disable:
    # TODO: Needs fixes before we can enable them
    - "bodyclose"
    - "dupl"
    - "exhaustive"
    - "forcetypeassert"
    - "goconst"
    - "gocritic"
    - "godoclint"
    - "godot"
    - "gosec"
    - "nilnil"
    - "noctx"
    - "testifylint"
    - "wrapcheck"

    # Maybe we want those?
    - "err113"
    - "errcheck"
    - "errchkjson"
    - "forbidigo"
    - "gochecknoglobals"
    - "ireturn"
    - "lll"
    - "musttag"
    - "perfsprint"
    - "prealloc"

    # Keep disabled
    - "contextcheck"
    - "cyclop"
    - "dogsled"
    - "embeddedstructfieldcheck"
    - "exhaustruct"
    - "funcorder"
    - "funlen"
    - "gocyclo"
    - "gocognit"
    - "goprintffuncname"
    - "gosmopolitan"
    - "mnd"
    - "nestif"
    - "nlreturn"
    - "noinlineerr"
    - "paralleltest"
    - "revive"
    - "tagliatelle"
    - "testpackage"
    - "varnamelen"
    - "wsl"
    - "wsl_v5"

  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: "github.com/pkg/errors"
              desc: "Should be replaced by standard lib errors package"

    lll:
      line-length: 150
